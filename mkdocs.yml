site_name: PortHound Docs
site_description: "Documentacion oficial de PortHound: instalacion, arquitectura, UI, API y persistencia"
site_author: PortHound Authors
site_url: https://porthound.jorgelsc.dev/
repo_url: https://github.com/jorgelsc-dev/porthound
repo_name: PortHound
edit_uri: edit/main/docs/

nav:
  - Inicio: index.md
  - Empezar: getting-started.md
  - Aplicacion: reference/ui.md
  - Arquitectura: architecture.md
  - Referencia:
      - Configuracion: reference/configuration.md
      - Seguridad: reference/security.md
      - Catalogos: reference/catalogs.md
      - Persistencia SQLite: reference/persistence.md
      - API HTTP: reference/api.md
      - WebSocket: reference/websocket.md

exclude_docs: |
  /index.html
  /docs-setup.md

theme:
  name: material
  language: es
  logo: assets/logo.png
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: slate
      primary: cyan
      accent: deep purple

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css
