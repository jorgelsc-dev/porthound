name: Package

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-release:
    name: GitHub Release (.deb + .zip)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: release_meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          RELEASE_TAG="main-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${SHORT_SHA}"
          RELEASE_NAME="Main build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"

          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "name=${RELEASE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Run unit tests
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pytest
          python3 -m pip install .
          pytest -q

      - name: Build Debian package
        run: ./packaging/deb/build.sh --output-dir dist/deb

      - name: Build ZIP package
        run: ./packaging/zip/build.sh --output-dir dist/zip

      - name: Resolve release assets
        id: assets
        run: |
          DEB_FILE="$(ls dist/deb/porthound_*_*.deb | head -n1)"
          ZIP_FILE="$(ls dist/zip/porthound_*.zip | head -n1)"
          if [[ -z "${DEB_FILE}" || -z "${ZIP_FILE}" ]]; then
            echo "Release assets not found"
            exit 1
          fi
          {
            echo "files<<EOF"
            echo "${DEB_FILE}"
            echo "${ZIP_FILE}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.assets.outputs.files }}
